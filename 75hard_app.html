<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="75 Hard">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#181816" media="(prefers-color-scheme: dark)">
<title>75 Hard</title>
<style>
:root {
  --bg: #f5f4f1; --surface: #ffffff; --surface2: #efefec; --surface3: #e8e7e3;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.15);
  --text: #1a1a18; --text2: #6b6a65; --text3: #a09f9a;
  --green: #1D9E75; --green-bg: #e1f5ee; --green-text: #085041; --green-bd: #5DCAA5;
  --amber: #EF9F27; --amber-bg: #faeeda; --amber-text: #633806; --amber-bd: #EF9F27;
  --purple: #534AB7; --purple-bg: #eeedfe; --purple-text: #3C3489; --purple-bd: #AFA9EC;
  --blue: #378ADD; --blue-bg: #e6f1fb; --blue-text: #0C447C;
  --coral: #D85A30; --coral-bg: #faece7; --coral-text: #712B13;
  --r: 12px; --rsm: 8px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #181816; --surface: #222220; --surface2: #2a2a28; --surface3: #323230;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0efe9; --text2: #9e9d98; --text3: #5a5955;
    --green-bg: rgba(29,158,117,0.15); --green-text: #9FE1CB; --green-bd: #0F6E56;
    --amber-bg: rgba(239,159,39,0.13); --amber-text: #FAC775; --amber-bd: #854F0B;
    --purple-bg: rgba(83,74,183,0.18); --purple-text: #CECBF6; --purple-bd: #534AB7;
    --blue-bg: rgba(55,138,221,0.13); --blue-text: #85B7EB;
    --coral-bg: rgba(216,90,48,0.13); --coral-text: #F0997B;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); }
.app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }

/* NAV */
.nav { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 4px; padding-bottom: calc(0px + var(--safe-bottom)); flex-shrink: 0; position: relative; z-index: 10; }
.nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 10px; cursor: pointer; color: var(--text3); transition: color 0.15s; border: none; background: none; font-size: 10px; font-weight: 500; }
.nav-tab.active { color: var(--purple); }
.nav-tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* SCREENS */
.screens { flex: 1; overflow: hidden; position: relative; }
.screen { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; display: none; -webkit-overflow-scrolling: touch; }
.screen.active { display: block; }
.screen-pad { padding: 16px 16px calc(16px + var(--safe-bottom)); }

/* HEADER */
.page-header { padding: 16px 16px 0; }
.page-title { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* CARDS */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
.card + .card, .card + .mt { margin-top: 10px; }
.mt { margin-top: 10px; }

/* TRACKER */
.stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.stat { background: var(--surface2); border-radius: var(--rsm); padding: 10px 12px; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.stat-val { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.prog-wrap { background: var(--surface2); border-radius: 99px; height: 5px; overflow: hidden; margin: 12px 0; }
.prog-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.3s; }
.rule-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--rsm); cursor: pointer; transition: background 0.1s; }
.rule-item + .rule-item { margin-top: 5px; }
.rule-item.done { background: var(--green-bg); border-color: var(--green-bd); }
.chk { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; color: transparent; transition: all 0.15s; }
.rule-item.done .chk { background: var(--green); border-color: var(--green); color: white; }
.rule-emoji { font-size: 18px; flex-shrink: 0; }
.rule-info { flex: 1; min-width: 0; }
.rule-name { font-size: 14px; font-weight: 600; }
.rule-desc { font-size: 12px; color: var(--text2); margin-top: 1px; }
.rule-item.done .rule-name { color: var(--green-text); }
.rule-item.done .rule-desc { color: var(--green-text); opacity: 0.75; }

/* DAY NAV */
.day-nav { display: flex; align-items: center; gap: 8px; padding: 14px 16px 0; }
.dnav-btn { background: var(--surface); border: 0.5px solid var(--border2); color: var(--text); border-radius: var(--rsm); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; flex-shrink: 0; }
.dnav-btn:disabled { opacity: 0.3; cursor: default; }
.day-badge { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; background: var(--purple-bg); color: var(--purple-text); }
.day-score { margin-left: auto; font-size: 20px; font-weight: 700; color: var(--text); }

/* CAL */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-lbl { font-size: 10px; color: var(--text3); text-align: center; padding-bottom: 4px; font-weight: 600; }
.cal-cell { aspect-ratio: 1; border-radius: 6px; border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text2); cursor: pointer; }
.cal-cell.today { border: 1.5px solid var(--purple); color: var(--purple); font-weight: 700; }
.cal-cell.perfect { background: var(--green); border-color: var(--green); color: white; font-weight: 600; }
.cal-cell.partial { background: var(--amber-bg); border-color: var(--amber-bd); color: var(--amber-text); }
.cal-cell.future { opacity: 0.2; pointer-events: none; }
.cal-cell.empty { border: none; pointer-events: none; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.leg-dot { width: 10px; height: 10px; border-radius: 3px; }

/* GYM */
.session-tabs { display: flex; gap: 6px; overflow-x: auto; padding: 14px 16px 0; scrollbar-width: none; }
.session-tabs::-webkit-scrollbar { display: none; }
.stab { flex-shrink: 0; padding: 7px 14px; font-size: 13px; font-weight: 600; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; white-space: nowrap; }
.stab.active-p { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-bd); }
.stab.active-l { background: var(--green-bg); color: var(--green-text); border-color: var(--green-bd); }
.stab.active-g { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-bd); }
.session-content { display: none; }
.session-content.vis { display: block; }
.s-header { padding: 12px 16px 4px; }
.s-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.s-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.divider { display: flex; align-items: center; gap: 8px; padding: 8px 16px 4px; }
.div-line { flex: 1; height: 0.5px; background: var(--border2); }
.div-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); }
.ex-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--rsm); margin: 0 16px 6px; padding: 12px 14px; }
.ex-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
.ex-name { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.new-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; background: var(--amber-bg); color: var(--amber-text); flex-shrink: 0; margin-top: 1px; }
.ex-sets { font-size: 12px; color: var(--text2); margin-top: 3px; margin-bottom: 8px; }
.muscles { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.mtag { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.mt-p { background: var(--purple-bg); color: var(--purple-text); }
.mt-l { background: var(--green-bg); color: var(--green-text); }
.mt-g { background: var(--amber-bg); color: var(--amber-text); }
.weight-row { display: flex; align-items: center; gap: 8px; }
.weight-label { font-size: 12px; color: var(--text2); flex-shrink: 0; }
.weight-input { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: var(--rsm); padding: 7px 10px; font-size: 14px; font-weight: 600; color: var(--text); width: 90px; text-align: center; outline: none; }
.weight-input:focus { border-color: var(--purple); }
.weight-unit { font-size: 12px; color: var(--text2); }
.weight-history { font-size: 11px; color: var(--text3); margin-top: 5px; }
.week-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin: 8px 16px 0; }
.wk-lbl { font-size: 10px; color: var(--text3); text-align: center; padding-bottom: 3px; font-weight: 600; }
.wk-cell { border-radius: 6px; padding: 6px 2px; text-align: center; font-size: 10px; font-weight: 600; border: 0.5px solid var(--border); }
.wk-p { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple-bd); }
.wk-l { background: var(--green-bg); color: var(--green-text); border-color: var(--green-bd); }
.wk-g { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-bd); }
.wk-r { color: var(--text3); }
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 14px 16px 6px; }
.note-box { margin: 4px 16px 8px; background: var(--surface2); border-left: 2px solid var(--purple-bd); border-radius: 0 var(--rsm) var(--rsm) 0; padding: 9px 12px; font-size: 12px; color: var(--text2); }
</style>
</head>
<body>
<div class="app">

  <!-- SCREENS -->
  <div class="screens">

    <!-- TRACKER SCREEN -->
    <div class="screen active" id="screen-tracker">
      <div class="page-header"><div class="page-title">75 Hard</div><div class="page-sub">Tu reto diario</div></div>

      <div class="day-nav">
        <button class="dnav-btn" id="prev-day" onclick="navDay(-1)">‹</button>
        <button class="dnav-btn" id="next-day" onclick="navDay(1)">›</button>
        <span class="day-badge" id="day-badge">Día 1 de 75</span>
        <span class="day-score" id="day-score">0/8</span>
      </div>

      <div class="screen-pad">
        <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

        <div class="stat-row">
          <div class="stat"><div class="stat-lbl">Perfectos</div><div class="stat-val" id="stat-perfect">0</div></div>
          <div class="stat"><div class="stat-lbl">Racha</div><div class="stat-val" id="stat-streak">0</div></div>
          <div class="stat"><div class="stat-lbl">% reto</div><div class="stat-val" id="stat-pct">0%</div></div>
        </div>

        <div style="margin-top:14px" id="rules-list"></div>

        <div class="card" style="margin-top:14px">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px">Progreso — 75 días</div>
          <div class="cal-grid" id="cal-grid"></div>
          <div class="legend" style="margin-top:8px">
            <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Perfecto</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--amber-bg);border:1px solid var(--amber)"></div>Parcial</div>
            <div class="leg-item"><div class="leg-dot" style="border:1.5px solid var(--purple);background:transparent"></div>Hoy</div>
          </div>
        </div>

        <button onclick="resetDay()" style="margin-top:10px;width:100%;padding:11px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rsm);font-size:13px;color:var(--text2);cursor:pointer;">Reiniciar día actual</button>
      </div>
    </div>

    <!-- GYM SCREEN -->
    <div class="screen" id="screen-gym">
      <div class="page-header" style="padding-bottom:4px"><div class="page-title">Gimnasio</div><div class="page-sub">Rutina PPL · registra tus pesos</div></div>

      <div class="session-tabs" id="session-tabs"></div>

      <div id="sessions-container"></div>

      <div class="sec-lbl">Semana tipo</div>
      <div class="week-row">
        <div class="wk-lbl">L</div><div class="wk-lbl">M</div><div class="wk-lbl">X</div>
        <div class="wk-lbl">J</div><div class="wk-lbl">V</div><div class="wk-lbl">S</div><div class="wk-lbl">D</div>
        <div class="wk-cell wk-p">Push A</div>
        <div class="wk-cell wk-l">Pull A</div>
        <div class="wk-cell wk-g">Legs A</div>
        <div class="wk-cell wk-p">Push B</div>
        <div class="wk-cell wk-l">Pull B</div>
        <div class="wk-cell wk-g">Legs B</div>
        <div class="wk-cell wk-r">—</div>
      </div>
      <div style="height:24px"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button class="nav-tab active" onclick="switchScreen('tracker',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Tracker
    </button>
    <button class="nav-tab" onclick="switchScreen('gym',this)">
      <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>
      Gimnasio
    </button>
  </div>
</div>

<script>
const STORE = '75hard_pwa_v1';
let S = {};
let currentDay = 0;

const RULES = [
  {id:'gym',     e:'🏋️', name:'Gimnasio',         desc:'1 sesión de fuerza (60–75 min)'},
  {id:'agua',    e:'💧', name:'Hidratación',       desc:'2.5 – 3 litros de agua'},
  {id:'lectura', e:'📖', name:'Lectura',           desc:'30 minutos · ficción o desarrollo'},
  {id:'estudio', e:'🎓', name:'Estudio',           desc:'2 horas · máster, TFM o aprendizaje'},
  {id:'foto',    e:'📷', name:'Foto de progreso',  desc:'1 foto diaria · misma hora'},
  {id:'movil',   e:'📵', name:'Móvil y redes',     desc:'Instagram ≤30 min · sin móvil después 22h'},
  {id:'orden',   e:'🏠', name:'Apartamento',       desc:'10 min de orden · platos, ropa, espacio'},
  {id:'journal', e:'📓', name:'Journaling',        desc:'Revisión nocturna del día'},
];

const SESSIONS = [
  {id:'p1', label:'Push A', type:'p', title:'Push A', sub:'Pecho plano · hombro · tríceps', note:'Alterna pecho → hombro → pecho. El tríceps trabaja en todo pero no se agota hasta el finisher.',
   blocks:[
    {lbl:'Pecho', exs:[{name:'Press pecho mancuernas', sets:'4 × 8–10 reps', tags:['Pectoral mayor','Tríceps','Deltoides ant.'], t:'p'}]},
    {lbl:'Hombro', exs:[{name:'Press de hombro', sets:'4 × 8–10 reps', tags:['Deltoides','Tríceps'], t:'p'}]},
    {lbl:'Pecho', exs:[{name:'Press inclinado', sets:'3 × 10–12 reps', tags:['Pectoral superior','Tríceps'], t:'p'}]},
    {lbl:'Hombro · tríceps', exs:[
      {name:'Subidas laterales', sets:'3 × 15 reps', tags:['Deltoides lateral'], t:'p'},
      {name:'Extensión tríceps polea', sets:'3 × 12–15 reps', tags:['Tríceps'], t:'p'},
    ]},
  ]},
  {id:'p2', label:'Push B', type:'p', title:'Push B', sub:'Hombro · pecho máquina · tríceps · salud hombro', note:'Hoy el hombro va primero. El face pull al final protege el manguito rotador.',
   blocks:[
    {lbl:'Hombro', exs:[{name:'Press de hombro', sets:'4 × 8–10 reps', tags:['Deltoides','Tríceps','Trapecio'], t:'p'}]},
    {lbl:'Pecho', exs:[{name:'Press pecho máquina', sets:'4 × 10–12 reps', tags:['Pectoral','Tríceps'], t:'p'}]},
    {lbl:'Pecho · hombro', exs:[{name:'Flys de pecho', sets:'3 × 12–15 reps', tags:['Pectoral (aislado)'], t:'p'}]},
    {lbl:'Tríceps · salud', exs:[
      {name:'Extensión tríceps cabeza', sets:'3 × 12 reps', tags:['Tríceps largo'], t:'p'},
      {name:'Face pull en polea', sets:'3 × 15 reps', tags:['Deltoides post.','Trapecio'], t:'p', isNew:true},
    ]},
  ]},
  {id:'l1', label:'Pull A', type:'l', title:'Pull A', sub:'Espalda ancha · bíceps alternados', note:'Patrón espalda → bíceps → espalda → bíceps → espalda. Llegas a cada ejercicio más fresco.',
   blocks:[
    {lbl:'Espalda', exs:[{name:'Pull-ups', sets:'4 × máx reps', tags:['Dorsal ancho','Bíceps','Core'], t:'l'}]},
    {lbl:'Bíceps', exs:[{name:'Curl bíceps mancuernas', sets:'3 × 12 reps', tags:['Bíceps braquial'], t:'l'}]},
    {lbl:'Espalda', exs:[{name:'Jalón al pecho', sets:'4 × 10–12 reps', tags:['Dorsal ancho','Redondo mayor'], t:'l'}]},
    {lbl:'Bíceps', exs:[{name:'Curl en martillo', sets:'3 × 12 reps', tags:['Braquial','Antebrazo'], t:'l'}]},
    {lbl:'Espalda', exs:[{name:'Dumbbell row', sets:'3 × 10 reps / lado', tags:['Dorsal','Romboides'], t:'l'}]},
  ]},
  {id:'l2', label:'Pull B', type:'l', title:'Pull B', sub:'Espalda gruesa · bíceps alternados', note:'El jalón agarre cerrado trabaja espalda y bíceps a la vez — puente natural entre bloques.',
   blocks:[
    {lbl:'Espalda', exs:[{name:'Remo con barra', sets:'4 × 8–10 reps', tags:['Dorsal completo','Romboides','Core'], t:'l', isNew:true}]},
    {lbl:'Bíceps', exs:[{name:'Curl bíceps mancuernas', sets:'3 × 12 reps', tags:['Bíceps braquial'], t:'l'}]},
    {lbl:'Espalda', exs:[{name:'Remo horizontal máquina', sets:'4 × 10–12 reps', tags:['Dorsal medio','Romboides','Trapecio'], t:'l'}]},
    {lbl:'Bíceps · espalda', exs:[{name:'Jalón agarre cerrado', sets:'3 × 12 reps', tags:['Dorsal inferior','Bíceps'], t:'l'}]},
    {lbl:'Finisher', exs:[{name:'Encogimientos mancuernas', sets:'3 × 15 reps', tags:['Trapecio superior'], t:'l', isNew:true}]},
  ]},
  {id:'g1', label:'Legs A', type:'g', title:'Legs A', sub:'Cuádriceps · isquio · glúteo alternados', note:'Sentadilla → curl femoral → press de pierna: el cuádriceps recupera mientras trabajas isquio.',
   blocks:[
    {lbl:'Cuádriceps', exs:[{name:'Sentadilla Smith machine', sets:'4 × 8–10 reps', tags:['Cuádriceps','Glúteo','Core'], t:'g'}]},
    {lbl:'Isquio', exs:[{name:'Curl femoral máquina', sets:'4 × 12 reps', tags:['Isquiotibiales'], t:'g'}]},
    {lbl:'Cuádriceps · glúteo', exs:[{name:'Press de pierna', sets:'4 × 10–12 reps', tags:['Cuádriceps','Glúteo','Isquio'], t:'g'}]},
    {lbl:'Glúteo', exs:[{name:'Máquina de glúteo', sets:'3 × 15 reps', tags:['Glúteo mayor'], t:'g'}]},
    {lbl:'Gemelos', exs:[{name:'Elevación gemelos de pie', sets:'4 × 20 reps', tags:['Gemelos','Sóleo'], t:'g', isNew:true}]},
  ]},
  {id:'g2', label:'Legs B', type:'g', title:'Legs B', sub:'Glúteo · cuádriceps · isquio · funcional', note:'Legs B es el más duro. Si llegas muy cansado, empieza por la búlgara y deja el hip thrust para después.',
   blocks:[
    {lbl:'Glúteo · isquio', exs:[{name:'Hip thrust con barra', sets:'4 × 12 reps', tags:['Glúteo mayor','Isquio'], t:'g', isNew:true}]},
    {lbl:'Cuádriceps', exs:[{name:'Sentadilla búlgara', sets:'4 × 10 reps / pierna', tags:['Cuádriceps','Glúteo','Equilibrio'], t:'g'}]},
    {lbl:'Cuádriceps (aislado)', exs:[{name:'Extensión de cuádriceps', sets:'3 × 15 reps', tags:['Cuádriceps (aislado)'], t:'g'}]},
    {lbl:'Funcional', exs:[{name:'Zancadas (lunges)', sets:'3 × 12 reps / pierna', tags:['Cuádriceps','Glúteo','Core'], t:'g'}]},
    {lbl:'Gemelos', exs:[{name:'Elevación gemelos sentado', sets:'4 × 20 reps', tags:['Sóleo'], t:'g', isNew:true}]},
  ]},
];

function load() {
  try { S = JSON.parse(localStorage.getItem(STORE) || '{}'); } catch(e) { S = {}; }
  currentDay = S.__day || 0;
}
function save() {
  S.__day = currentDay;
  try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e) {}
}

function dk(d) { return 'day_'+d; }
function dayData(d) { return S[dk(d)] || {done:[]}; }
function weightKey(sid, exName) { return 'w_'+sid+'_'+exName.replace(/\s/g,'_'); }

function toggleRule(ruleId) {
  if (!S[dk(currentDay)]) S[dk(currentDay)] = {done:[]};
  const arr = S[dk(currentDay)].done;
  const i = arr.indexOf(ruleId);
  i === -1 ? arr.push(ruleId) : arr.splice(i,1);
  save(); renderTracker();
}

function navDay(d) {
  currentDay = Math.max(0, Math.min(74, currentDay + d));
  save(); renderTracker();
}

function resetDay() {
  if (S[dk(currentDay)]) S[dk(currentDay)].done = [];
  save(); renderTracker();
}

function calcStats() {
  let perfect = 0, streak = 0, cur = 0;
  for (let d = 0; d < 75; d++) {
    const n = dayData(d).done.length;
    if (n === 8) { perfect++; cur++; streak = Math.max(streak, cur); } else cur = 0;
  }
  return {perfect, streak};
}

function renderTracker() {
  const dd = dayData(currentDay);
  const doneSet = new Set(dd.done);
  const pct = Math.round((doneSet.size / 8) * 100);
  const {perfect, streak} = calcStats();

  document.getElementById('day-badge').textContent = 'Día ' + (currentDay+1) + ' de 75';
  document.getElementById('day-score').textContent = doneSet.size + '/8';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('stat-perfect').textContent = perfect;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-pct').textContent = Math.round((perfect/75)*100) + '%';
  document.getElementById('prev-day').disabled = currentDay === 0;
  document.getElementById('next-day').disabled = currentDay === 74;

  let rulesHTML = '';
  for (const r of RULES) {
    const done = doneSet.has(r.id);
    rulesHTML += `<div class="rule-item${done?' done':''}" onclick="toggleRule('${r.id}')">
      <div class="chk">${done?'✓':''}</div>
      <span class="rule-emoji">${r.e}</span>
      <div class="rule-info"><div class="rule-name">${r.name}</div><div class="rule-desc">${r.desc}</div></div>
    </div>`;
  }
  document.getElementById('rules-list').innerHTML = rulesHTML;

  let calHTML = '';
  for (const l of ['L','M','X','J','V','S','D']) calHTML += `<div class="cal-lbl">${l}</div>`;
  const pad = 0;
  for (let p = 0; p < pad; p++) calHTML += `<div class="cal-cell empty"></div>`;
  for (let d = 0; d < 75; d++) {
    const n = dayData(d).done.length;
    let cls = 'cal-cell';
    if (d === currentDay) cls += ' today';
    else if (n === 8) cls += ' perfect';
    else if (n > 0) cls += ' partial';
    else if (d > currentDay) cls += ' future';
    calHTML += `<div class="${cls}" onclick="jumpDay(${d})">${d+1}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = calHTML;
}

function jumpDay(d) { currentDay = d; save(); renderTracker(); }

function renderGym() {
  const tabsEl = document.getElementById('session-tabs');
  const contEl = document.getElementById('sessions-container');
  let tabsHTML = '', sessHTML = '';
  const typeActive = {p:'active-p', l:'active-l', g:'active-g'};

  SESSIONS.forEach((sess, idx) => {
    const isFirst = idx === 0;
    tabsHTML += `<div class="stab${isFirst?' '+typeActive[sess.type]:''}" id="stab-${sess.id}" onclick="switchSession('${sess.id}')">${sess.label}</div>`;

    sessHTML += `<div class="session-content${isFirst?' vis':''}" id="sess-${sess.id}">
      <div class="s-header"><div class="s-title">${sess.title}</div><div class="s-sub">${sess.sub}</div></div>`;

    for (const block of sess.blocks) {
      sessHTML += `<div class="divider"><div class="div-line"></div><div class="div-lbl">${block.lbl}</div><div class="div-line"></div></div>`;
      for (const ex of block.exs) {
        const wk = weightKey(sess.id, ex.name);
        const hist = getWeightHistory(wk);
        const tagClass = {p:'mt-p', l:'mt-l', g:'mt-g'}[ex.t];
        sessHTML += `<div class="ex-card">
          <div class="ex-top">
            <span class="ex-name">${ex.name}</span>
            ${ex.isNew ? '<span class="new-tag">añadido</span>' : ''}
          </div>
          <div class="ex-sets">${ex.sets}</div>
          <div class="muscles">${ex.tags.map(t=>`<span class="mtag ${tagClass}">${t}</span>`).join('')}</div>
          <div class="weight-row">
            <span class="weight-label">Peso:</span>
            <input class="weight-input" type="number" inputmode="decimal" placeholder="—" value="${S[wk]||''}"
              onchange="saveWeight('${wk}', this.value)" id="wi-${wk}">
            <span class="weight-unit">kg</span>
          </div>
          <div class="weight-history" id="wh-${wk}">${hist}</div>
        </div>`;
      }
    }
    sessHTML += `<div class="note-box">${sess.note}</div></div>`;
  });

  tabsEl.innerHTML = tabsHTML;
  contEl.innerHTML = sessHTML;
}

function getWeightHistory(wk) {
  const hist = S[wk+'_hist'];
  if (!hist || !hist.length) return '';
  const last3 = hist.slice(-3).map(h => h.w+'kg').join(' → ');
  return 'Últimos registros: ' + last3;
}

function saveWeight(wk, val) {
  if (!val) { delete S[wk]; save(); return; }
  const num = parseFloat(val);
  if (isNaN(num)) return;
  S[wk] = num;
  if (!S[wk+'_hist']) S[wk+'_hist'] = [];
  const today = new Date().toISOString().slice(0,10);
  const last = S[wk+'_hist'].slice(-1)[0];
  if (!last || last.d !== today) {
    S[wk+'_hist'].push({d: today, w: num});
    if (S[wk+'_hist'].length > 10) S[wk+'_hist'].shift();
  } else {
    last.w = num;
  }
  save();
  const histEl = document.getElementById('wh-'+wk);
  if (histEl) histEl.textContent = getWeightHistory(wk);
}

function switchSession(id) {
  document.querySelectorAll('.session-content').forEach(el => el.classList.remove('vis'));
  document.querySelectorAll('.stab').forEach(el => { el.className = 'stab'; });
  document.getElementById('sess-'+id).classList.add('vis');
  const sess = SESSIONS.find(s => s.id === id);
  const typeActive = {p:'active-p', l:'active-l', g:'active-g'};
  document.getElementById('stab-'+id).classList.add(typeActive[sess.type]);
  document.getElementById('stab-'+id).scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function switchScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
}

load();
renderTracker();
renderGym();
</script>
</body>
</html>
