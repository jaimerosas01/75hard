<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="75 Hard">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#181816" media="(prefers-color-scheme: dark)">
<title>75 Hard</title>
<style>
:root {
  --bg:#f5f4f1;--surface:#fff;--surface2:#efefec;--surface3:#e8e7e3;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.15);
  --text:#1a1a18;--text2:#6b6a65;--text3:#a09f9a;
  --green:#1D9E75;--green-bg:#e1f5ee;--green-text:#085041;--green-bd:#5DCAA5;
  --amber:#EF9F27;--amber-bg:#faeeda;--amber-text:#633806;--amber-bd:#EF9F27;
  --purple:#534AB7;--purple-bg:#eeedfe;--purple-text:#3C3489;--purple-bd:#AFA9EC;
  --r:12px;--rsm:8px;--sb:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#181816;--surface:#222220;--surface2:#2a2a28;--surface3:#323230;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0efe9;--text2:#9e9d98;--text3:#5a5955;
  --green-bg:rgba(29,158,117,0.15);--green-text:#9FE1CB;--green-bd:#0F6E56;
  --amber-bg:rgba(239,159,39,0.13);--amber-text:#FAC775;--amber-bd:#854F0B;
  --purple-bg:rgba(83,74,183,0.18);--purple-text:#CECBF6;--purple-bd:#534AB7;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border);padding:0 4px;padding-bottom:var(--sb);flex-shrink:0;order:2;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;color:var(--text3);border:none;background:none;font-size:10px;font-weight:600;}
.nav-tab.active{color:var(--purple);}
.nav-tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.screens{flex:1;overflow:hidden;order:1;}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch;}
.screen.active{display:block;}
.screens{position:relative;}

/* TRACKER */
.t-header{padding:16px 16px 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.t-title{font-size:28px;font-weight:700;letter-spacing:-0.03em;}
.t-date{font-size:13px;color:var(--text2);text-align:right;line-height:1.4;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px;}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:3px;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-0.02em;}

/* CALENDAR */
.cal-wrap{padding:0 16px 12px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-month{font-size:14px;font-weight:600;color:var(--text);}
.cal-nav-btns{display:flex;gap:4px;}
.cal-nav-btn{background:var(--surface2);border:none;color:var(--text2);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-lbl{font-size:10px;color:var(--text3);text-align:center;padding-bottom:4px;font-weight:700;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:0.5px solid transparent;gap:2px;}
.cal-cell.in-range{color:var(--text2);border-color:var(--border);}
.cal-cell.today{border:2px solid var(--purple);color:var(--purple);font-weight:700;}
.cal-cell.selected{background:var(--purple);color:white;border-color:var(--purple);font-weight:700;}
.cal-cell.perfect{background:var(--green);color:white;border-color:var(--green);}
.cal-cell.partial{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-bd);}
.cal-cell.future{color:var(--text3);border-color:var(--border);opacity:0.4;}
.cal-cell.empty{pointer-events:none;}
.cal-cell.out{pointer-events:none;opacity:0;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0.6;}
.cal-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.leg-d{width:10px;height:10px;border-radius:3px;}

/* RULES */
.rules-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;}
.rules-day-label{font-size:15px;font-weight:700;color:var(--text);}
.rules-score{font-size:13px;color:var(--text2);}
.prog-wrap{background:var(--surface2);border-radius:99px;height:4px;overflow:hidden;margin:0 16px 10px;}
.prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width 0.3s;}
.rule-item{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rsm);cursor:pointer;margin:0 16px 5px;}
.rule-item.done{background:var(--green-bg);border-color:var(--green-bd);}
.chk{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;transition:all 0.15s;}
.rule-item.done .chk{background:var(--green);border-color:var(--green);color:white;}
.rule-emoji{font-size:18px;flex-shrink:0;}
.rule-info{flex:1;min-width:0;}
.rule-name{font-size:14px;font-weight:600;}
.rule-desc{font-size:12px;color:var(--text2);margin-top:1px;}
.rule-item.done .rule-name{color:var(--green-text);}
.rule-item.done .rule-desc{color:var(--green-text);opacity:0.75;}
.reset-btn{display:block;margin:8px 16px 24px;padding:11px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--rsm);font-size:13px;color:var(--text2);cursor:pointer;width:calc(100% - 32px);text-align:center;}

/* GYM */
.gym-header{padding:16px 16px 8px;}
.gym-title{font-size:28px;font-weight:700;letter-spacing:-0.03em;}
.gym-sub{font-size:13px;color:var(--text2);margin-top:2px;}
.stabs{display:flex;gap:6px;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none;}
.stabs::-webkit-scrollbar{display:none;}
.stab{flex-shrink:0;padding:7px 14px;font-size:13px;font-weight:600;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;}
.stab.sp{background:var(--purple-bg);color:var(--purple-text);border-color:var(--purple-bd);}
.stab.sl{background:var(--green-bg);color:var(--green-text);border-color:var(--green-bd);}
.stab.sg{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-bd);}
.sess{display:none;}
.sess.vis{display:block;}
.s-hdr{padding:0 16px 4px;}
.s-title{font-size:18px;font-weight:700;letter-spacing:-0.02em;}
.s-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.divider{display:flex;align-items:center;gap:8px;padding:10px 16px 4px;}
.div-line{flex:1;height:0.5px;background:var(--border2);}
.div-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);}
.ex-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rsm);margin:0 16px 6px;padding:12px 14px;}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px;}
.ex-name{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.new-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--amber-bg);color:var(--amber-text);flex-shrink:0;margin-top:1px;}
.ex-sets{font-size:12px;color:var(--text2);margin-bottom:8px;}
.muscles{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.mtag{font-size:11px;padding:2px 8px;border-radius:20px;}
.mtp{background:var(--purple-bg);color:var(--purple-text);}
.mtl{background:var(--green-bg);color:var(--green-text);}
.mtg{background:var(--amber-bg);color:var(--amber-text);}
.weight-row{display:flex;align-items:center;gap:8px;}
.weight-lbl{font-size:12px;color:var(--text2);flex-shrink:0;}
.weight-in{background:var(--surface2);border:0.5px solid var(--border2);border-radius:var(--rsm);padding:7px 10px;font-size:15px;font-weight:600;color:var(--text);width:90px;text-align:center;outline:none;}
.weight-in:focus{border-color:var(--purple);}
.weight-unit{font-size:12px;color:var(--text2);}
.weight-hist{font-size:11px;color:var(--text3);margin-top:5px;min-height:14px;}
.note-box{margin:4px 16px 8px;background:var(--surface2);border-left:2px solid var(--purple-bd);border-radius:0 var(--rsm) var(--rsm) 0;padding:9px 12px;font-size:12px;color:var(--text2);}
.week-section{padding:8px 16px 0;}
.week-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:24px;}
.wk-lbl{font-size:10px;color:var(--text3);text-align:center;padding-bottom:3px;font-weight:600;}
.wk-cell{border-radius:6px;padding:6px 2px;text-align:center;font-size:10px;font-weight:600;border:0.5px solid var(--border);}
.wk-p{background:var(--purple-bg);color:var(--purple-text);border-color:var(--purple-bd);}
.wk-l{background:var(--green-bg);color:var(--green-text);border-color:var(--green-bd);}
.wk-g{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-bd);}
.wk-r{color:var(--text3);}
</style>
</head>
<body>
<div class="app">
  <div class="screens">

    <!-- TRACKER -->
    <div class="screen active" id="screen-tracker">
      <div class="t-header">
        <div class="t-title">75 Hard</div>
        <div class="t-date" id="t-date"></div>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="stat-lbl">Perfectos</div><div class="stat-val" id="st-perfect">0</div></div>
        <div class="stat"><div class="stat-lbl">Racha</div><div class="stat-val" id="st-streak">0</div></div>
        <div class="stat"><div class="stat-lbl">% reto</div><div class="stat-val" id="st-pct">0%</div></div>
      </div>

      <div class="cal-wrap">
        <div class="cal-header">
          <span class="cal-month" id="cal-month"></span>
          <div class="cal-nav-btns">
            <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
            <button class="cal-nav-btn" onclick="calNav(1)">›</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
        <div class="cal-legend">
          <div class="leg-i"><div class="leg-d" style="background:var(--green)"></div>Perfecto</div>
          <div class="leg-i"><div class="leg-d" style="background:var(--amber-bg);border:1px solid var(--amber)"></div>Parcial</div>
          <div class="leg-i"><div class="leg-d" style="border:2px solid var(--purple);background:transparent"></div>Hoy</div>
        </div>
      </div>

      <div class="rules-header">
        <span class="rules-day-label" id="rules-day-label"></span>
        <span class="rules-score" id="rules-score"></span>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div id="rules-list"></div>
      <button class="reset-btn" onclick="resetDay()">Reiniciar este día</button>
    </div>

    <!-- GYM -->
    <div class="screen" id="screen-gym">
      <div class="gym-header">
        <div class="gym-title">Gimnasio</div>
        <div class="gym-sub">Rutina PPL · registra tus pesos</div>
      </div>
      <div class="stabs" id="stabs"></div>
      <div id="sess-container"></div>
      <div class="week-section">
        <div class="week-lbl">Semana tipo</div>
        <div class="week-grid">
          <div class="wk-lbl">L</div><div class="wk-lbl">M</div><div class="wk-lbl">X</div>
          <div class="wk-lbl">J</div><div class="wk-lbl">V</div><div class="wk-lbl">S</div><div class="wk-lbl">D</div>
          <div class="wk-cell wk-p">Push A</div><div class="wk-cell wk-l">Pull A</div><div class="wk-cell wk-g">Legs A</div>
          <div class="wk-cell wk-p">Push B</div><div class="wk-cell wk-l">Pull B</div><div class="wk-cell wk-g">Legs B</div>
          <div class="wk-cell wk-r">—</div>
        </div>
      </div>
    </div>

  </div>

  <div class="nav">
    <button class="nav-tab active" onclick="switchScreen('tracker',this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Tracker
    </button>
    <button class="nav-tab" onclick="switchScreen('gym',this)">
      <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M3 8h3M18 8h3M3 16h3M18 16h3M6 12h12"/></svg>
      Gimnasio
    </button>
  </div>
</div>

<script>
const START_DATE = new Date(2026, 5, 13); // 13 junio 2026
const STORE = '75hard_v2';
let S = {};
let selectedDay = 0; // 0-indexed desde START_DATE
let calViewYear, calViewMonth;

function todayIndex() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.floor((today - START_DATE) / 86400000);
  return Math.max(0, Math.min(74, diff));
}

function dateFromIndex(i) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + i);
  return d;
}

function indexFromDate(d) {
  const clean = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  return Math.floor((clean - START_DATE) / 86400000);
}

const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES = ['L','M','X','J','V','S','D'];

const RULES = [
  {id:'gym',     e:'🏋️', name:'Gimnasio',         desc:'1 sesión de fuerza (60–75 min)'},
  {id:'agua',    e:'💧', name:'Hidratación',       desc:'2.5 – 3 litros de agua'},
  {id:'lectura', e:'📖', name:'Lectura',           desc:'30 minutos · ficción o desarrollo'},
  {id:'estudio', e:'🎓', name:'Estudio',           desc:'2 horas · máster, TFM o aprendizaje'},
  {id:'foto',    e:'📷', name:'Foto de progreso',  desc:'1 foto diaria · misma hora'},

  {id:'orden',   e:'🏠', name:'Apartamento',       desc:'10 min de orden · platos, ropa, espacio'},
  {id:'journal', e:'📓', name:'Journaling',        desc:'Revisión nocturna del día'},
];

const SESSIONS = [
  {id:'p1',label:'Push A',type:'p',title:'Push A',sub:'Pecho plano · hombro · tríceps',note:'Alterna pecho → hombro → pecho. El tríceps trabaja en todo pero no se agota hasta el finisher.',blocks:[
    {lbl:'Pecho',exs:[{n:'Press pecho mancuernas',s:'4 × 8–10 reps',t:['Pectoral mayor','Tríceps','Deltoides ant.'],c:'p'}]},
    {lbl:'Hombro',exs:[{n:'Press de hombro',s:'4 × 8–10 reps',t:['Deltoides','Tríceps'],c:'p'}]},

  ]},
  {id:'p2',label:'Push B',type:'p',title:'Push B',sub:'Hombro · pecho máquina · tríceps · salud hombro',note:'Hoy el hombro va primero. El face pull al final protege el manguito rotador.',blocks:[
    {lbl:'Hombro',exs:[{n:'Press de hombro',s:'4 × 8–10 reps',t:['Deltoides','Tríceps','Trapecio'],c:'p'}]},
    {lbl:'Pecho',exs:[{n:'Press pecho máquina',s:'4 × 10–12 reps',t:['Pectoral','Tríceps'],c:'p'}]},
    {lbl:'Pecho · hombro',exs:[{n:'Flys de pecho',s:'3 × 12–15 reps',t:['Pectoral (aislado)'],c:'p'}]},
    {lbl:'Tríceps · salud',exs:[{n:'Extensión tríceps cabeza',s:'3 × 12 reps',t:['Tríceps largo'],c:'p'},{n:'Face pull en polea',s:'3 × 15 reps',t:['Deltoides post.','Trapecio'],c:'p',nw:true}]},
  ]},
  {id:'l1',label:'Pull A',type:'l',title:'Pull A',sub:'Espalda ancha · bíceps alternados',note:'Patrón espalda → bíceps → espalda → bíceps → espalda. Llegas a cada ejercicio más fresco.',blocks:[
    {lbl:'Espalda',exs:[{n:'Pull-ups',s:'4 × máx reps',t:['Dorsal ancho','Bíceps','Core'],c:'l'}]},
    {lbl:'Bíceps',exs:[{n:'Curl bíceps mancuernas',s:'3 × 12 reps',t:['Bíceps braquial'],c:'l'}]},
    {lbl:'Espalda',exs:[{n:'Jalón al pecho',s:'4 × 10–12 reps',t:['Dorsal ancho','Redondo mayor'],c:'l'}]},
    {lbl:'Bíceps',exs:[{n:'Curl en martillo',s:'3 × 12 reps',t:['Braquial','Antebrazo'],c:'l'}]},
    {lbl:'Espalda',exs:[{n:'Dumbbell row',s:'3 × 10 reps / lado',t:['Dorsal','Romboides'],c:'l'}]},
  ]},
  {id:'l2',label:'Pull B',type:'l',title:'Pull B',sub:'Espalda gruesa · bíceps alternados',note:'El jalón agarre cerrado trabaja espalda y bíceps a la vez — puente natural entre bloques.',blocks:[

    {lbl:'Bíceps',exs:[{n:'Curl bíceps mancuernas',s:'3 × 12 reps',t:['Bíceps braquial'],c:'l'}]},

    {lbl:'Bíceps · espalda',exs:[{n:'Jalón agarre cerrado',s:'3 × 12 reps',t:['Dorsal inferior','Bíceps'],c:'l'}]},

    {lbl:'Glúteo',exs:[{n:'Máquina de glúteo',s:'3 × 15 reps',t:['Glúteo mayor'],c:'g'}]},
    {lbl:'Gemelos',exs:[{n:'Elevación gemelos de pie',s:'4 × 20 reps',t:['Gemelos','Sóleo'],c:'g',nw:true}]},
  ]},
  {id:'g2',label:'Legs B',type:'g',title:'Legs B',sub:'Glúteo · cuádriceps · isquio · funcional',note:'Legs B es el más duro. Si llegas muy cansado empieza por la búlgara y deja el hip thrust para después.',blocks:[

    {lbl:'Cuádriceps',exs:[{n:'Sentadilla búlgara',s:'4 × 10 reps / pierna',t:['Cuádriceps','Glúteo','Equilibrio'],c:'g'}]},
    {lbl:'Cuádriceps (aislado)',exs:[{n:'Extensión de cuádriceps',s:'3 × 15 reps',t:['Cuádriceps (aislado)'],c:'g'}]},
    {lbl:'Funcional',exs:[{n:'Zancadas (lunges)',s:'3 × 12 reps / pierna',t:['Cuádriceps','Glúteo','Core'],c:'g'}]},
    {lbl:'Gemelos',exs:[{n:'Elevación gemelos sentado',s:'4 × 20 reps',t:['Sóleo'],c:'g',nw:true}]},
  ]},
];

function load() {
  try { S = JSON.parse(localStorage.getItem(STORE)||'{}'); } catch(e){ S={}; }
}
function save() {
  try { localStorage.setItem(STORE, JSON.stringify(S)); } catch(e){}
}

function dk(i){ return 'd'+i; }
function dayData(i){ return S[dk(i)]||{done:[]}; }

function toggleRule(ruleId) {
  if(!S[dk(selectedDay)]) S[dk(selectedDay)]={done:[]};
  const arr = S[dk(selectedDay)].done;
  const i = arr.indexOf(ruleId);
  i===-1 ? arr.push(ruleId) : arr.splice(i,1);
  save(); renderTracker();
}

function resetDay() {
  if(S[dk(selectedDay)]) S[dk(selectedDay)].done=[];
  save(); renderTracker();
}

function calcStats() {
  let perfect=0, streak=0, cur=0;
  const today = todayIndex();
  for(let d=0;d<=today;d++){
    const n=dayData(d).done.length;
    if(n===8){perfect++;cur++;streak=Math.max(streak,cur);}else cur=0;
  }
  return {perfect,streak};
}

function renderTracker() {
  const ti = todayIndex();
  const dd = dayData(selectedDay);
  const doneSet = new Set(dd.done);
  const pct = Math.round((doneSet.size/8)*100);
  const {perfect,streak} = calcStats();
  const selDate = dateFromIndex(selectedDay);
  const isToday = selectedDay === ti;
  const isFuture = selectedDay > ti;

  const dayNames = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  document.getElementById('t-date').innerHTML =
    `Día ${selectedDay+1} de 75<br>${dayNames[selDate.getDay()]} ${selDate.getDate()} ${MONTHS_ES[selDate.getMonth()].toLowerCase()}`;

  document.getElementById('st-perfect').textContent = perfect;
  document.getElementById('st-streak').textContent = streak;
  document.getElementById('st-pct').textContent = Math.round((perfect/75)*100)+'%';

  renderCalendar();

  const labelText = isToday ? 'Hoy · ' + doneSet.size+'/8 reglas' : 'Día '+(selectedDay+1)+' · '+doneSet.size+'/8 reglas';
  document.getElementById('rules-day-label').textContent = labelText;
  document.getElementById('rules-score').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';

  let html = '';
  for(const r of RULES){
    const done = doneSet.has(r.id);
    const disabled = isFuture ? 'style="opacity:0.5;pointer-events:none"' : '';
    html += `<div class="rule-item${done?' done':''}" onclick="toggleRule('${r.id}')" ${disabled}>
      <div class="chk">${done?'✓':''}</div>
      <span class="rule-emoji">${r.e}</span>
      <div class="rule-info"><div class="rule-name">${r.name}</div><div class="rule-desc">${r.desc}</div></div>
    </div>`;
  }
  document.getElementById('rules-list').innerHTML = html;
}

function renderCalendar() {
  const ti = todayIndex();
  const today = dateFromIndex(Math.min(ti,74));

  if(calViewYear===undefined){
    calViewYear = today.getFullYear();
    calViewMonth = today.getMonth();
  }

  document.getElementById('cal-month').textContent = MONTHS_ES[calViewMonth] + ' ' + calViewYear;

  const firstDay = new Date(calViewYear, calViewMonth, 1);
  const lastDay = new Date(calViewYear, calViewMonth+1, 0);
  let startDow = firstDay.getDay(); // 0=sun
  startDow = startDow===0 ? 6 : startDow-1; // convert to mon=0

  let html = '';
  for(const l of DAYS_ES) html += `<div class="cal-lbl">${l}</div>`;
  for(let p=0;p<startDow;p++) html += `<div class="cal-cell empty"></div>`;

  for(let d=1;d<=lastDay.getDate();d++){
    const date = new Date(calViewYear, calViewMonth, d);
    const idx = indexFromDate(date);
    const inRange = idx >= 0 && idx < 75;
    const isToday = idx === ti;
    const isSelected = idx === selectedDay;
    const isFuture = idx > ti;
    const n = inRange ? dayData(idx).done.length : 0;

    let cls = 'cal-cell';
    if(!inRange){ cls += ' out'; }
    else if(isSelected && !isToday){ cls += ' selected'; }
    else if(isToday && isSelected){ cls += ' today selected'; }
    else if(isToday){ cls += ' today'; }
    else if(n===8){ cls += ' perfect'; }
    else if(n>0){ cls += ' partial'; }
    else if(isFuture){ cls += ' future'; }
    else{ cls += ' in-range'; }

    const onclick = inRange ? `onclick="selectDay(${idx})"` : '';
    const dot = inRange && n>0 && n<8 && !isSelected ? '<div class="cal-dot"></div>' : '';
    html += `<div class="${cls}" ${onclick}>${d}${dot}</div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
}

function selectDay(idx) {
  selectedDay = idx;
  renderTracker();
}

function calNav(d) {
  calViewMonth += d;
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  renderCalendar();
}

function renderGym() {
  const typeClass = {p:'sp',l:'sl',g:'sg'};
  let tabsHTML = '', sessHTML = '';

  SESSIONS.forEach((sess,idx) => {
    const isFirst = idx===0;
    tabsHTML += `<div class="stab${isFirst?' '+typeClass[sess.type]:''}" id="stab-${sess.id}" onclick="switchSess('${sess.id}')">${sess.label}</div>`;
    sessHTML += `<div class="sess${isFirst?' vis':''}" id="sess-${sess.id}">
      <div class="s-hdr"><div class="s-title">${sess.title}</div><div class="s-sub">${sess.sub}</div></div>`;

    for(const blk of sess.blocks){
      sessHTML += `<div class="divider"><div class="div-line"></div><div class="div-lbl">${blk.lbl}</div><div class="div-line"></div></div>`;
      for(const ex of blk.exs){
        const wk = 'w_'+sess.id+'_'+ex.n.replace(/\s+/g,'_');
        const hist = getHist(wk);
        const mc = {p:'mtp',l:'mtl',g:'mtg'}[ex.c];
        sessHTML += `<div class="ex-card">
          <div class="ex-top"><span class="ex-name">${ex.n}</span>${ex.nw?'<span class="new-tag">añadido</span>':''}</div>
          <div class="ex-sets">${ex.s}</div>
          <div class="muscles">${ex.t.map(t=>`<span class="mtag ${mc}">${t}</span>`).join('')}</div>
          <div class="weight-row">
            <span class="weight-lbl">Peso:</span>
            <input class="weight-in" type="number" inputmode="decimal" placeholder="—" value="${S[wk]||''}" onchange="saveW('${wk}',this.value)">
            <span class="weight-unit">kg</span>
          </div>
          <div class="weight-hist" id="wh-${wk}">${hist}</div>
        </div>`;
      }
    }
    sessHTML += `<div class="note-box">${sess.note}</div></div>`;
  });

  document.getElementById('stabs').innerHTML = tabsHTML;
  document.getElementById('sess-container').innerHTML = sessHTML;
}

function getHist(wk){
  const h = S[wk+'_h'];
  if(!h||!h.length) return '';
  return 'Registros: '+h.slice(-3).map(x=>x.w+'kg').join(' → ');
}

function saveW(wk,val){
  if(!val){delete S[wk];save();return;}
  const n=parseFloat(val);
  if(isNaN(n)) return;
  S[wk]=n;
  if(!S[wk+'_h']) S[wk+'_h']=[];
  const today=new Date().toISOString().slice(0,10);
  const last=S[wk+'_h'].slice(-1)[0];
  if(!last||last.d!==today) S[wk+'_h'].push({d:today,w:n});
  else last.w=n;
  if(S[wk+'_h'].length>10) S[wk+'_h'].shift();
  save();
  const el=document.getElementById('wh-'+wk);
  if(el) el.textContent=getHist(wk);
}

function switchSess(id){
  document.querySelectorAll('.sess').forEach(e=>e.classList.remove('vis'));
  document.querySelectorAll('.stab').forEach(e=>e.className='stab');
  document.getElementById('sess-'+id).classList.add('vis');
  const sess=SESSIONS.find(s=>s.id===id);
  const tc={p:'sp',l:'sl',g:'sg'};
  document.getElementById('stab-'+id).classList.add(tc[sess.type]);
  document.getElementById('stab-'+id).scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function switchScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  btn.classList.add('active');
}

load();
selectedDay = todayIndex();
renderTracker();
renderGym();
</script>
</body>
</html>
